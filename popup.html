<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Website Dev Annotator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <h2>AI Website Dev Annotator</h2>
    <button id="settings-btn" class="header-icon-btn" title="Settings">⚙️</button>
    <span id="count-badge" class="count-badge"></span>
    <button id="search-btn" class="header-icon-btn" title="Search annotations">🔍</button>
    <button id="history-btn" class="header-icon-btn" title="View annotation history">🕐</button>
  </div>

  <!-- Google-Docs-style search bar (hidden by default) -->
  <div id="search-bar" class="search-bar" style="display:none;">
    <input type="text" id="search-input" class="search-input" placeholder="Search annotations…" autocomplete="off" spellcheck="false" />
    <span id="search-count" class="search-count"></span>
    <button id="search-prev" class="search-nav-btn" title="Previous (Shift+Enter)">↑</button>
    <button id="search-next" class="search-nav-btn" title="Next (Enter)">↓</button>
    <button id="search-close" class="search-close-btn" title="Close (Esc)">✕</button>
  </div>

  <!-- Restore-from-sync banner (shown only when local is empty but sync has data) -->
  <div id="restore-banner" class="restore-banner" style="display:none;"></div>

  <!-- Undo-clear banner (shown briefly after Clear All or Cut All) -->
  <div id="clear-undo-banner" class="clear-undo-banner" style="display:none;"></div>

  <div id="annotations-list"></div>
  <div id="history-panel" style="display:none;"></div>
  <div id="settings-panel" style="display:none;"></div>

  <div class="footer">
    <button id="copy-btn" class="cut-btn">
      <span>✂ Cut All</span>
      <span class="cut-hint">right-click: copy only</span>
    </button>
    <button id="clear-btn" class="clear-btn">
      <span>🗑 Clear All</span>
      <span class="cut-hint">right-click: save for later</span>
    </button>
  </div>

  <!-- Non-intrusive meta-footer: star rating, Ko-fi, Hire Me -->
  <div class="meta-footer">
    <div class="star-rating" id="star-rating" title="Enjoying AI Website Dev Annotator? Leave a review!">
      <span class="star" data-star="1">★</span>
      <span class="star" data-star="2">★</span>
      <span class="star" data-star="3">★</span>
      <span class="star" data-star="4">★</span>
      <span class="star" data-star="5">★</span>
      <span class="star-label">Rate</span>
    </div>
    <div class="meta-links">
      <a href="#" class="meta-link" data-url="https://ko-fi.com/asharma2027" title="Support development on Ko-fi">☕ Ko-fi</a>
      <span class="meta-sep">·</span>
      <a href="#" class="meta-link" data-url="https://www.linkedin.com/in/asharma2027/" title="Hire the developer">💼 Hire Me</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
